<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Workout Tracker">
  <rect width="512" height="512" rx="96" fill="#1a1f1c"/>
  <!-- Minimal dumbbell mark, centered, soft green accent on dark -->
  <g stroke="#5eead4" stroke-linecap="round" fill="#5eead4">
    <!-- center bar -->
    <rect x="176" y="240" width="160" height="32" rx="16"/>
    <!-- left weights -->
    <rect x="120" y="200" width="40" height="112" rx="20"/>
    <rect x="80" y="224" width="40" height="64" rx="20"/>
    <!-- right weights -->
    <rect x="352" y="200" width="40" height="112" rx="20"/>
    <rect x="392" y="224" width="40" height="64" rx="20"/>
  </g>
</svg>
